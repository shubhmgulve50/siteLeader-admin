name: Build on Dev Branch

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # ✅ latest stable

      - name: Set up Node.js (latest LTS)
        uses: actions/setup-node@v4 # ✅ latest stable
        with:
          node-version: "lts/*" # ✅ always grabs the latest LTS version

      - name: Install dependencies
        run: npm ci # ✅ faster & cleaner than `npm install` for CI

      - name: Run build
        run: npm run build
